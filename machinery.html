<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata for page rendering and responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Machinery Tracker</title>

    <!-- Link to main stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Include header layout (shared across pages) -->
    <div data-include-html="basic-layout/header.html"></div>

    <!-- Hero section for page intro -->
    <section class="hero">
        <div class="hero-content">
            <h2>All Machinery</h2>
            <p>Track the status of all machines in real-time.</p>
        </div>
    </section>

    <!-- Main machine data section -->
    <section class="machine-section">

        <!-- Chart overview section showing status breakdown -->
        <section class="machine-chart">
            <h3>Machine Status Overview</h3>
            <!-- Chart.js canvas for displaying pie/doughnut chart -->
            <canvas id="machineStatusChart" width="400" height="200"></canvas>
        </section>

        <!-- Table for listing all machine data -->
        <table class="machine-table">
            <thead>
                <tr>
                    <th>Machine Name</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Machine rows will be dynamically generated by JS -->
            </tbody>
        </table>

    </section>

    <!-- Modal popup for showing individual machine details -->
    <div id="machine-details-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <!-- Close button for the modal -->
            <span class="close-btn" onclick="closeDetailsModal()">&times;</span>
            <h3>Machine Details</h3>
            <!-- Fields that will be filled by JavaScript on click -->
            <p><strong>Name:</strong> <span id="detail-name"></span></p>
            <p><strong>Status:</strong> <span id="detail-status"></span></p>
            <p><strong>Building:</strong> <span id="detail-building"></span></p>
            <p><strong>Additional Info:</strong> <span id="detail-info"></span></p>
        </div>
    </div>

    <!-- Shared chatbot layout component -->
    <div data-include-html="basic-layout/chatbot.html"></div>

    <!-- Shared footer layout component -->
    <div data-include-html="basic-layout/footer.html"></div>

    <!-- JavaScript includes -->
    <script src="../Java Script Client Side/javascript/chatbot.js"></script>
    <script src="../Java Script Client Side/javascript/toggle-brightness.js"></script>
    <script src="../Java Script Client Side/javascript/login-check.js"></script>
    <script src="../Java Script Client Side/javascript/include-html.js"></script>
    <script src="../Java Script Client Side/javascript/machinery.js"></script>

    <!-- Chart.js library for rendering the status chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>

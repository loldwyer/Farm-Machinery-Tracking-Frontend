<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadata for character encoding and compatibility -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title in browser tab -->
    <title>Admin Login Page</title>

    <!-- Link to external CSS file for login styling -->
    <link rel="stylesheet" href="css/admin-login.css">
</head>

<body>
<!-- Main container for the login form -->
<div class="container" id="loginContainer">

    <!-- Box styling the login form block -->
    <div class="box" id="loginBox">
        <h2>Admin-Only Login</h2>

        <!-- Login form with ID to hook into JavaScript -->
        <form id="loginForm">

            <!-- Username input -->
            <div class="input_box">
                <input type="text" id="username" aria-label="user" required>
                <label>Username</label>
            </div>

            <!-- Password input -->
            <div class="input_box">
                <input type="password" id="password" aria-label="pass" required>
                <label>Password</label>
            </div>

            <!-- Submit button for the form -->
            <button class="login-button" type="submit">Go to dashboard</button>
        </form>
    </div>
</div>

<!-- JavaScript file that handles login logic -->
<script src="../Java Script Client Side/javascript/admin-login.js"></script>

</body>
</html>
